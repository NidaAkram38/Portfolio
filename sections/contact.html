<section id="contact">
  <div class="fade-up">
    <span class="section-label">Get In Touch</span>
    <h2 class="section-title">Contact Me</h2>
    <p class="section-sub">Have a project in mind or just want to say hi? Drop me a message!</p>
    <div class="divider contact-divider"></div>
  </div>

  <div class="contact-grid fade-up">

    <!-- Left: Contact Info -->
    <div class="contact-info">

      <div class="contact-item">
  <div class="contact-icon">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" 
         viewBox="0 0 24 24" stroke="white" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" 
            d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
    </svg>
  </div>
  <div>
          <div class="contact-label">Email</div>
          <div class="contact-value">
            <a href="mailto:nida@example.com">nida.akramcs@gmail.com</a>
          </div>
        </div>
      </div>

      <div class="contact-item">
        <div class="contact-icon">📍</div>
        <div>
          <div class="contact-label">Location</div>
          <div class="contact-value">MULTAN, Pakistan</div>
        </div>
      </div>

      <div class="contact-item">
  <div class="contact-icon">
    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/github/github-original.svg" 
         alt="GitHub" width="24" height="24" style="filter: invert(1);" />
  </div>
  <div>
          <div class="contact-label">GitHub</div>
          <div class="contact-value">
            <a href="https://github.com/NidaAkram38" target="_blank">
              github.com/NidaAkram38
            </a>
          </div>
        </div>
      </div>

      <div class="contact-item">
  <div class="contact-icon">
    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/linkedin/linkedin-original.svg" 
         alt="LinkedIn" width="24" height="24" />
  </div>
  <div>
          <div class="contact-label">LinkedIn</div>
          <div class="contact-value">
            <a href="https://www.linkedin.com/in/nida-akram-b062a8305/" target="_blank">
              linkedin.com/in/https:/nida-akram-b062a8305/
            </a>
          </div>
        </div>
      </div>

    </div>

    <!-- Right: Message Form -->
    <div class="contact-form" id="contactForm">

      <div class="form-row">
        <div class="form-group">
          <label>Your Name</label>
          <input type="text" class="form-input" id="senderName" placeholder="John Doe"/>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" class="form-input" id="senderEmail" placeholder="john@example.com"/>
        </div>
      </div>

      <div class="form-group">
        <label>Subject</label>
        <input type="text" class="form-input" id="msgSubject" placeholder="Project Inquiry"/>
      </div>

      <div class="form-group">
        <label>Message</label>
        <textarea class="form-input" id="msgBody" placeholder="Tell me about your project..."></textarea>
      </div>

      <button class="form-btn" id="submitBtn" onclick="handleFormSubmit()">
        Send Message →
      </button>

    </div>

  </div>
</section>
